<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1a0f38"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </radialGradient>
    <filter id="glowCyan" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPhosphor" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" rx="18" fill="url(#bg)"/>

  <!-- line-chart trend, background layer -->
  <polyline points="8,72 20,64 28,69 38,50 48,57 58,32 68,40 79,21 92,27"
    fill="none" stroke="#29f1ff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.6" filter="url(#glowCyan)"/>
  <circle cx="38" cy="50" r="2.2" fill="#29f1ff" opacity="0.8"/>
  <circle cx="58" cy="32" r="2.2" fill="#29f1ff" opacity="0.8"/>
  <circle cx="79" cy="21" r="2.2" fill="#29f1ff" opacity="0.8"/>

  <!-- wrench, foreground -->
  <g transform="rotate(-45 50 52)" filter="url(#glowPhosphor)">
    <rect x="46" y="34" width="8" height="46" rx="4" fill="#4dff9f"/>
    <circle cx="50" cy="26" r="13" fill="#4dff9f"/>
    <circle cx="50" cy="26" r="7" fill="#0a0118"/>
    <rect x="36" y="78" width="28" height="20" rx="6" fill="#4dff9f"/>
    <rect x="44" y="90" width="12" height="10" fill="#0a0118"/>
  </g>
</svg>
