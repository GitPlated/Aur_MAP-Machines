<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect x="1.5" y="1.5" width="97" height="97" rx="13" fill="#ffffff" stroke="#0a0118" stroke-width="3"/>

  <!-- line-chart trend, background layer, bold double-stroke for contrast on white -->
  <polyline points="4,86 16,76 26,82 40,54 52,64 64,28 77,39 96,12"
    fill="none" stroke="#0a0118" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="4,86 16,76 26,82 40,54 52,64 64,28 77,39 96,12"
    fill="none" stroke="#29f1ff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="40" cy="54" r="4" fill="#29f1ff" stroke="#0a0118" stroke-width="2"/>
  <circle cx="64" cy="28" r="4" fill="#29f1ff" stroke="#0a0118" stroke-width="2"/>

  <!-- wrench, foreground, enlarged + outlined for boldness -->
  <g transform="rotate(-45 50 50)" stroke="#0a0118" stroke-width="3" stroke-linejoin="round" paint-order="stroke">
    <rect x="43" y="20" width="14" height="58" rx="7" fill="#4dff9f"/>
    <circle cx="50" cy="14" r="16" fill="#4dff9f"/>
    <circle cx="50" cy="14" r="8" fill="#ffffff" stroke-width="2.5"/>
    <rect x="27" y="74" width="46" height="26" rx="9" fill="#4dff9f"/>
    <rect x="40" y="90" width="20" height="14" fill="#ffffff" stroke="none"/>
  </g>
</svg>
